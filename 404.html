<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found | Emerado Museum</title>
  <meta name="description" content="Page not found." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            museumBlue: '#1e3a8a',
            museumStone: '#475569',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-gray-50 text-slate-700">

<!-- NAV -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4">
    <div class="flex justify-between h-16 items-center">
      <a href="/index.html" class="font-serif font-bold text-xl text-museumBlue">
        EMERADO MUSEUM
      </a>

      <div class="hidden md:flex items-center space-x-8 text-sm">
        <a href="/about.html" class="hover:text-museumBlue">About</a>
        <a href="/collections.html" class="hover:text-museumBlue">Collections</a>
        <a href="/visit.html" class="hover:text-museumBlue">Visit</a>
        <a href="/contact.html" class="hover:text-museumBlue">Contact</a>
        <a href="/privacy.html" class="hover:text-museumBlue">Privacy</a>
      </div>

      <!-- Mobile menu -->
      <button id="menuBtn" class="md:hidden inline-flex items-center justify-center rounded-md border px-3 py-2 text-sm hover:bg-gray-50" aria-expanded="false" aria-controls="mobileNav">
        Menu
      </button>
    </div>

    <div id="mobileNav" class="md:hidden hidden pb-4">
      <div class="flex flex-col space-y-2 text-sm">
        <a href="/about.html" class="hover:text-museumBlue">About</a>
        <a href="/collections.html" class="hover:text-museumBlue">Collections</a>
        <a href="/visit.html" class="hover:text-museumBlue">Visit</a>
        <a href="/contact.html" class="hover:text-museumBlue">Contact</a>
        <a href="/privacy.html" class="hover:text-museumBlue">Privacy</a>
      </div>
    </div>
  </div>
</nav>

<script>
  (function () {
    const btn = document.getElementById('menuBtn');
    const nav = document.getElementById('mobileNav');
    if (!btn || !nav) return;
    btn.addEventListener('click', () => {
      const isHidden = nav.classList.contains('hidden');
      nav.classList.toggle('hidden', !isHidden);
      btn.setAttribute('aria-expanded', String(isHidden));
    });
  })();
</script>

<section class="bg-white">
  <div class="max-w-4xl mx-auto px-4 py-24 text-center">
    <h1 class="font-serif text-5xl text-museumBlue">404</h1>
    <p class="mt-6 text-lg text-museumStone">Sorry—this page could not be found.</p>
    <div class="mt-10">
      <a href="/index.html" class="inline-flex justify-center rounded-md bg-museumBlue px-6 py-3 text-sm font-semibold text-white hover:opacity-90">
        Back to Home
      </a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-slate-900 text-slate-300 py-12 mt-16">
  <div class="max-w-6xl mx-auto text-center px-4">
    <p class="font-serif text-lg text-white">Emerado Museum</p>
    <p class="mt-2 text-sm">1086 22nd St NE · Emerado, ND 58228</p>
    <p class="mt-2 text-sm">📧 <a class="hover:underline" href="mailto:info@emeradomuseum.org">info@emeradomuseum.org</a></p>
    <p class="mt-2 text-xs">© 2026 Emerado Museum. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
